<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Janvière &amp; Pacifique · 11 July 2026</title>
    <meta
      name="description"
      content="A quiet promise, written by two. Join Janvière Uwimbabazi and Pacifique Muhinyuza on July 11, 2026."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" href="fonts/GreatVibes-Regular.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Ambient audio (auto-play attempted; falls back to a discreet button) -->
    <audio
      id="ambient"
      src="audio/Andy BUMUNTU - IGITEGO [ Official Video ].mp3"
      preload="auto"
      loop
    ></audio>

    <button class="audio-toggle" id="audioToggle" type="button" aria-label="Toggle music" aria-pressed="false">
      <span class="audio-toggle__icon" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </span>
      <span class="audio-toggle__text">Music</span>
    </button>

    <!-- Top frame — pill nav -->
    <header class="frame" aria-label="Site frame">
      <div class="frame__pill">
        <a href="#top" class="frame__brand" aria-label="Janvière and Pacifique — home">
          <span class="frame__monogram">J <span class="frame__amp">&amp;</span> P</span>
        </a>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero" id="top" aria-live="polite">
      <div class="hero__inner">
        <p class="kicker" data-reveal="fade">Two souls &middot; One quiet promise</p>

        <h1 class="couple" data-reveal="up">Janvière &amp; Pacifique</h1>

        <p class="hero__save" data-reveal="up">save the date, 11<sup>th</sup> July 2026.</p>

        <div class="countdown" data-reveal="up" data-wedding="2026-07-11T09:00:00+02:00">
          <div class="countdown__unit">
            <span class="countdown__num" data-unit="days">000</span>
            <span class="countdown__lbl">days</span>
          </div>
          <span class="countdown__sep" aria-hidden="true">:</span>
          <div class="countdown__unit">
            <span class="countdown__num" data-unit="hours">00</span>
            <span class="countdown__lbl">hours</span>
          </div>
          <span class="countdown__sep" aria-hidden="true">:</span>
          <div class="countdown__unit">
            <span class="countdown__num" data-unit="minutes">00</span>
            <span class="countdown__lbl">minutes</span>
          </div>
          <span class="countdown__sep" aria-hidden="true">:</span>
          <div class="countdown__unit">
            <span class="countdown__num" data-unit="seconds">00</span>
            <span class="countdown__lbl">seconds</span>
          </div>
        </div>
      </div>

    </section>

    <script src="script.js"></script>
  </body>
</html>
